<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Chord Vibe — Guitar Chord Catalog</title>
<meta name="description" content="A convenient mobile guide to guitar chords. Learn chord shapes and play with comfort.">

<meta property="og:type" content="website">
<meta property="og:url" content="https://gluberth.github.io/GuitarChords/">
<meta property="og:title" content="Chord Vibe — Guitar Chord Catalog">
<meta property="og:description" content="A convenient mobile guide to guitar chords. Learn chord shapes and play with comfort.">
<meta property="og:image" content="https://MyFitTrainingPlan.com/social-preview-guitar.jpg">

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="https://gluberth.github.io/GuitarChords/">
<meta property="twitter:title" content="Chord Vibe — Guitar Chord Catalog">
<meta property="twitter:description" content="A convenient mobile guide to guitar chords. Learn chord shapes and play with comfort.">
<meta property="twitter:image" content="https://MyFitTrainingPlan.com/social-preview-guitar.jpg">
<link rel="icon" type="image/png" href="https://MyFitTrainingPlan.com/logoGuitar.jpg">
<link rel="apple-touch-icon" href="https://MyFitTrainingPlan.com/logoGuitar.jpg">
  <style>
    /* Настройка цветовых тем */
    :root {
      --bg-color: #f4f4f9;
      --text-color: #2b2b2b;
      --card-bg: #ffffff;
      --accent-color: #ff5722;
    }

    [data-theme="dark"] {
      --bg-color: #1a1a2e;
      --text-color: #e0e0e0;
      --card-bg: #16213e;
      --accent-color: #e94560;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      /* Запрет выделения текста для мобильных устройств */
      -webkit-user-select: none; /* Safari */
      -moz-user-select: none;    /* Firefox */
      -ms-user-select: none;     /* IE 10+ и Edge */
      user-select: none;         /* Стандартный синтаксис */
      /* Убираем подсветку при клике (тапе) на мобилках */
      -webkit-tap-highlight-color: transparent; 
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      font-size: 20px;
    }

    .theme-toggle {
      background: none;
      border: 2px solid var(--text-color);
      color: var(--text-color);
      padding: 5px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .chord-slider {
      flex: 1;
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .chord-slider::-webkit-scrollbar {
      display: none;
    }

    .chord-card {
      min-width: 100vw;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 80px 20px;
    }

    .chord-content {
      background-color: var(--card-bg);
      width: 80%;
      max-width: 350px;
      aspect-ratio: 2 / 3;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s;
      position: relative;
    }

    .chord-name {
      font-size: 42px;
      font-weight: bold;
      color: var(--accent-color);
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .swipe-hint {
      margin-bottom: 20px;
      font-size: 12px;
      opacity: 0.5;
    }
    .filters {
      padding: 10px 20px;
      background-color: var(--bg-color);
      z-index: 10;
    }
    .filter-row {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      margin-bottom: 10px;
      scrollbar-width: none; /* Прячем скроллбар */
      justify-content: space-evenly;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    
    .filter-pill {
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--text-color);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap; /* Чтобы текст не переносился */
      transition: all 0.2s;
    }
    .filter-pill.active {
      background-color: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
    }
  </style>
</head>
<body>

  <header>
    <span>🎸 Chord Vibe</span>
    <button class="theme-toggle" id="themeBtn">🌙</button>
  </header>
  <div class="filters">
    <div class="filter-row" id="root-filters">
      <button class="filter-pill active" data-root="all">Все</button>
      <button class="filter-pill" data-root="C">C</button>
      <button class="filter-pill" data-root="C#">C#</button>
      <button class="filter-pill" data-root="D">D</button>
      <button class="filter-pill" data-root="Eb">Eb</button>
      <button class="filter-pill" data-root="E">E</button>
      <button class="filter-pill" data-root="F">F</button>
      <button class="filter-pill" data-root="F#">F#</button>
      <button class="filter-pill" data-root="G">G</button>
      <button class="filter-pill" data-root="Ab">Ab</button>
      <button class="filter-pill" data-root="A">A</button>
      <button class="filter-pill" data-root="Bb">Bb</button>
      <button class="filter-pill" data-root="B">B</button>
    </div>
    <div class="filter-row" id="type-filters">
      <button class="filter-pill active" data-type="all">Все</button>
      <button class="filter-pill" data-type="major">Major</button>
      <button class="filter-pill" data-type="minor">Minor</button>
      <button class="filter-pill" data-type="7">7th</button>
      <button class="filter-pill" data-type="m7">m7</button>
      <button class="filter-pill" data-type="maj7">maj7</button>
      <button class="filter-pill" data-type="sus4">sus4</button>
      <button class="filter-pill" data-type="5">Power</button>
    </div>
</div>
  <div class="chord-slider" id="slider">
    </div>

  <script>
    // 1. Наши данные (Массив аккордов)
    const chords = [
  // --- МАЖОРНЫЕ (Major) ---
  { name: "C Major", type: "major", root: "C", frets: "x 3 2 0 1 0" },
  { name: "C# Major", type: "major", root: "C#", frets: "x 4 6 6 6 4" }, 
  { name: "D Major", type: "major", root: "D", frets: "x x 0 2 3 2" },
  { name: "Eb Major", type: "major", root: "Eb", frets: "x 6 8 8 8 6" }, 
  { name: "E Major", type: "major", root: "E", frets: "0 2 2 1 0 0" },
  { name: "F Major", type: "major", root: "F", frets: "1 3 3 2 1 1" },
  { name: "F# Major", type: "major", root: "F#", frets: "2 4 4 3 2 2" }, 
  { name: "G Major", type: "major", root: "G", frets: "3 2 0 0 0 3" },
  { name: "Ab Major", type: "major", root: "Ab", frets: "4 6 6 5 4 4" }, 
  { name: "A Major", type: "major", root: "A", frets: "x 0 2 2 2 0" },
  { name: "Bb Major", type: "major", root: "Bb", frets: "x 1 3 3 3 1" }, 
  { name: "B Major", type: "major", root: "B", frets: "x 2 4 4 4 2" },

  // --- МИНОРНЫЕ (Minor) ---
  { name: "C Minor", type: "minor", root: "C", frets: "x 3 5 5 4 3" },
  { name: "C# Minor", type: "minor", root: "C#", frets: "x 4 6 6 5 4" }, 
  { name: "D Minor", type: "minor", root: "D", frets: "x x 0 2 3 1" },
  { name: "Eb Minor", type: "minor", root: "Eb", frets: "x 6 8 8 7 6" }, 
  { name: "E Minor", type: "minor", root: "E", frets: "0 2 2 0 0 0" },
  { name: "F Minor", type: "minor", root: "F", frets: "1 3 3 1 1 1" },
  { name: "F# Minor", type: "minor", root: "F#", frets: "2 4 4 2 2 2" }, 
  { name: "G Minor", type: "minor", root: "G", frets: "3 5 5 3 3 3" },
  { name: "Ab Minor", type: "minor", root: "Ab", frets: "4 6 6 4 4 4" }, 
  { name: "A Minor", type: "minor", root: "A", frets: "x 0 2 2 1 0" },
  { name: "Bb Minor", type: "minor", root: "Bb", frets: "x 1 3 3 2 1" }, 
  { name: "B Minor", type: "minor", root: "B", frets: "x 2 4 4 3 2" },

  // --- ДОМИНАНТСЕПТАККОРДЫ (7) ---
  { name: "C 7", type: "7", root: "C", frets: "x 3 2 3 1 0" },
  { name: "D 7", type: "7", root: "D", frets: "x x 0 2 1 2" },
  { name: "E 7", type: "7", root: "E", frets: "0 2 0 1 0 0" },
  { name: "F 7", type: "7", root: "F", frets: "1 3 1 2 1 1" }, 
  { name: "G 7", type: "7", root: "G", frets: "3 2 0 0 0 1" },
  { name: "A 7", type: "7", root: "A", frets: "x 0 2 0 2 0" },
  { name: "B 7", type: "7", root: "B", frets: "x 2 1 2 0 2" }, 

  // --- МИНОРНЫЕ СЕПТАККОРДЫ (m7) ---
  { name: "C m7", type: "m7", root: "C", frets: "x 3 5 3 4 3" },
  { name: "D m7", type: "m7", root: "D", frets: "x x 0 2 1 1" },
  { name: "E m7", type: "m7", root: "E", frets: "0 2 2 0 3 0" },
  { name: "F m7", type: "m7", root: "F", frets: "1 3 1 1 1 1" },
  { name: "G m7", type: "m7", root: "G", frets: "3 5 3 3 3 3" },
  { name: "A m7", type: "m7", root: "A", frets: "x 0 2 0 1 0" },
  { name: "B m7", type: "m7", root: "B", frets: "x 2 4 2 3 2" },

  // --- БОЛЬШИЕ МАЖОРНЫЕ СЕПТАККОРДЫ (maj7) ---
  { name: "C maj7", type: "maj7", root: "C", frets: "x 3 2 0 0 0" },
  { name: "D maj7", type: "maj7", root: "D", frets: "x x 0 2 2 2" },
  { name: "E maj7", type: "maj7", root: "E", frets: "0 2 1 1 0 0" },
  { name: "F maj7", type: "maj7", root: "F", frets: "x x 3 2 1 0" },
  { name: "G maj7", type: "maj7", root: "G", frets: "3 2 0 0 0 2" },
  { name: "A maj7", type: "maj7", root: "A", frets: "x 0 2 1 2 0" },

  // --- АККОРДЫ С ЗАДЕРЖАНИЕМ (sus4) ---
  { name: "C sus4", type: "sus4", root: "C", frets: "x 3 3 0 1 1" },
  { name: "D sus4", type: "sus4", root: "D", frets: "x x 0 2 3 3" },
  { name: "E sus4", type: "sus4", root: "E", frets: "0 2 2 2 0 0" },
  { name: "A sus4", type: "sus4", root: "A", frets: "x 0 2 2 3 0" },

  // --- ПАУЭР-АККОРДЫ / КВИНТАККОРДЫ (5) ---
  { name: "C 5", type: "5", root: "C", frets: "x 3 5 5 x x" },
  { name: "D 5", type: "5", root: "D", frets: "x 5 7 7 x x" },
  { name: "E 5", type: "5", root: "E", frets: "0 2 2 x x x" },
  { name: "F 5", type: "5", root: "F", frets: "1 3 3 x x x" },
  { name: "G 5", type: "5", root: "G", frets: "3 5 5 x x x" },
  { name: "A 5", type: "5", root: "A", frets: "5 7 7 x x x" },
  { name: "B 5", type: "5", root: "B", frets: "x 2 4 4 x x" }
];

    // 2. Функция отрисовки аккорда на Canvas
    function drawChordOnCanvas(canvas, fretsStr) {
      const ctx = canvas.getContext('2d');
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      const drawColor = isDark ? '#e0e0e0' : '#2b2b2b';
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      ctx.strokeStyle = drawColor;
      ctx.fillStyle = drawColor;
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const startX = 25;
      const startY = 40;
      const stringSpacing = 20;
      const fretSpacing = 30;
      const numStrings = 6;
      const numFrets = 5;

      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(startX + (numStrings - 1) * stringSpacing, startY);
      ctx.stroke();

      ctx.lineWidth = 2;
      for (let i = 1; i <= numFrets; i++) {
        ctx.beginPath();
        ctx.moveTo(startX, startY + i * fretSpacing);
        ctx.lineTo(startX + (numStrings - 1) * stringSpacing, startY + i * fretSpacing);
        ctx.stroke();
      }

      for (let i = 0; i < numStrings; i++) {
        ctx.beginPath();
        ctx.moveTo(startX + i * stringSpacing, startY);
        ctx.lineTo(startX + i * stringSpacing, startY + numFrets * fretSpacing);
        ctx.stroke();
      }

      const notes = fretsStr.split(' ');
      for (let i = 0; i < numStrings; i++) {
        const note = notes[i].toLowerCase();
        const x = startX + i * stringSpacing;
        
        if (note === 'x') {
          ctx.fillText('x', x, startY - 15);
        } else if (note === '0' || note === 'o') {
          ctx.beginPath();
          ctx.arc(x, startY - 15, 4, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          const fretNum = parseInt(note);
          if (!isNaN(fretNum) && fretNum > 0) {
            const y = startY + (fretNum - 0.5) * fretSpacing;
            ctx.beginPath();
            ctx.arc(x, y, 7, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }

    // 3. Логика фильтров и создания карточек
    let currentRoot = 'all';
    let currentType = 'all';
    const slider = document.getElementById('slider');

    function renderCards() {
      slider.innerHTML = ''; 
      
      const filteredChords = chords.filter(chord => {
        const rootMatch = currentRoot === 'all' || chord.root === currentRoot;
        const typeMatch = currentType === 'all' || chord.type === currentType;
        return rootMatch && typeMatch;
      });

      if (filteredChords.length === 0) {
        slider.innerHTML = '<div style="margin: auto; opacity: 0.5;">Chords not found 🎸</div>';
        return;
      }

      filteredChords.forEach((chord) => {
        const card = document.createElement('div');
        card.className = 'chord-card';
        card.innerHTML = `
          <div class="chord-content">
            <div class="chord-name">${chord.name}</div>
            <div class="canvas-container">
              <canvas class="chord-canvas" width="150" height="220" data-frets="${chord.frets}"></canvas>
            </div>
          </div>
        `;
        slider.appendChild(card);
      });

      // Сразу рисуем графику на свежесозданных канвасах
      document.querySelectorAll('.chord-canvas').forEach(canvas => {
        drawChordOnCanvas(canvas, canvas.getAttribute('data-frets'));
      });
    }

    // Слушатели кликов для фильтров
    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const target = e.target;
        const row = target.closest('.filter-row');
        
        row.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        target.classList.add('active');

        if (target.hasAttribute('data-root')) {
          currentRoot = target.getAttribute('data-root');
        } else if (target.hasAttribute('data-type')) {
          currentType = target.getAttribute('data-type');
        }

        renderCards();
      });
    });

    // Первый запуск отрисовки
    renderCards();

    // 4. Логика переключения темы
    const themeBtn = document.getElementById('themeBtn');
    
    if (localStorage.getItem('theme') === 'dark') {
      document.body.setAttribute('data-theme', 'dark');
      themeBtn.textContent = '☀️';
    } else {
      themeBtn.textContent = '🌙';
    }

    themeBtn.addEventListener('click', () => {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        themeBtn.textContent = '🌙';
      } else {
        document.body.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        themeBtn.textContent = '☀️';
      }
      
      // Перерисовываем графику при смене темы, чтобы поменять цвет линий
      document.querySelectorAll('.chord-canvas').forEach(canvas => {
        drawChordOnCanvas(canvas, canvas.getAttribute('data-frets'));
      });
    });
  </script>

</body>
</html>
