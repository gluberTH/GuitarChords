  <style>
    /* Настройка цветовых тем */
    :root {
      --bg-color: #f4f4f9;
      --text-color: #2b2b2b;
      --card-bg: #ffffff;
      --accent-color: #ff5722;
    }

    [data-theme="dark"] {
      --bg-color: #1a1a2e;
      --text-color: #e0e0e0;
      --card-bg: #16213e;
      --accent-color: #e94560;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      /* Запрет выделения текста для мобильных устройств */
      -webkit-user-select: none; /* Safari */
      -moz-user-select: none;    /* Firefox */
      -ms-user-select: none;     /* IE 10+ и Edge */
      user-select: none;         /* Стандартный синтаксис */
      /* Убираем подсветку при клике (тапе) на мобилках */
      -webkit-tap-highlight-color: transparent; 
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      font-size: 20px;
    }

    .theme-toggle {
      background: none;
      border: 2px solid var(--text-color);
      color: var(--text-color);
      padding: 5px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .chord-slider {
      flex: 1;
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .chord-slider::-webkit-scrollbar {
      display: none;
    }

    .chord-card {
      min-width: 100vw;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 80px 20px;
    }

    .chord-content {
      background-color: var(--card-bg);
      width: 80%;
      max-width: 350px;
      aspect-ratio: 2 / 3;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s;
      position: relative;
    }

    .chord-name {
      font-size: 42px;
      font-weight: bold;
      color: var(--accent-color);
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .swipe-hint {
      margin-bottom: 20px;
      font-size: 12px;
      opacity: 0.5;
    }
    .filters {
      padding: 10px 20px;
      background-color: var(--bg-color);
      z-index: 10;
    }
    .filter-row {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      margin-bottom: 10px;
      scrollbar-width: none; /* Прячем скроллбар */
      justify-content: space-evenly;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    
    .filter-pill {
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--text-color);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap; /* Чтобы текст не переносился */
      transition: all 0.2s;
    }
    .filter-pill.active {
      background-color: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
    }

    // 2. Функция отрисовки аккорда на Canvas
    // 2. Функция отрисовки аккорда на Canvas
function drawChordOnCanvas(canvas, fretsStr) {
  const ctx = canvas.getContext('2d');
  const isDark = document.body.getAttribute('data-theme') === 'dark';
  const drawColor = isDark ? '#e0e0e0' : '#2b2b2b';
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  ctx.strokeStyle = drawColor;
  ctx.fillStyle = drawColor;
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // !!! Увеличиваем отступ слева, чтобы поместились цифры
  const startX = 30; // Было 25
  const startY = 40;
  const stringSpacing = 20;
  const fretSpacing = 30;
  const numStrings = 6;
  // Увеличиваем количество ладов для примера, 
  // чтобы 5-ый лад тоже был виден
  const numFrets = 7; 

  // Рисуем верхний порожек (нулевой лад)
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(startX + (numStrings - 1) * stringSpacing, startY);
  ctx.stroke();

  // Рисуем лады (горизонтальные линии)
  ctx.lineWidth = 2;
  for (let i = 1; i <= numFrets; i++) {
    ctx.beginPath();
    ctx.moveTo(startX, startY + i * fretSpacing);
    ctx.lineTo(startX + (numStrings - 1) * stringSpacing, startY + i * fretSpacing);
    ctx.stroke();
  }

  // !!! ДОБАВЛЕННЫЙ БЛОК: Отрисовка номеров ладов слева
  ctx.textAlign = 'right'; // Выравниваем текст по правому краю
  // Мы хотим подписать 1, 3 и 5 лады
  const fretsToLabel = [1, 3, 5];
  for (let fret of fretsToLabel) {
    // Проверяем, что лад попадает в видимую область
    if (fret <= numFrets) {
      // Вычисляем Y-координату: Y порожка + (номер лада - 0.5) * высоту лада
      const y = startY + (fret - 0.5) * fretSpacing;
      // Рисуем текст с небольшим отступом влево от сетки
      ctx.fillText(`${fret}`, startX - 10, y);
    }
  }
  // Возвращаем выравнивание по умолчанию для точек
  ctx.textAlign = 'center'; 

  // Рисуем струны (вертикальные линии)
  for (let i = 0; i < numStrings; i++) {
    ctx.beginPath();
    ctx.moveTo(startX + i * stringSpacing, startY);
    ctx.lineTo(startX + i * stringSpacing, startY + numFrets * fretSpacing);
    ctx.stroke();
  }

  const notes = fretsStr.split(' ');
  for (let i = 0; i < numStrings; i++) {
    const note = notes[i].toLowerCase();
    const x = startX + i * stringSpacing;
    
    if (note === 'x') {
      ctx.fillText('x', x, startY - 15);
    } else if (note === '0' || note === 'o') {
      ctx.beginPath();
      ctx.arc(x, startY - 15, 4, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      const fretNum = parseInt(note);
      if (!isNaN(fretNum) && fretNum > 0) {
        const y = startY + (fretNum - 0.5) * fretSpacing;
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

    // 3. Логика фильтров и создания карточек

            </div>
          </div>
        `;
        slider.appendChild(card);
      });

      document.querySelectorAll('.chord-canvas').forEach(canvas => {
        drawChordOnCanvas(canvas, canvas.getAttribute('data-frets'));
      });
    }

    // Слушатели кликов для фильтров
    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const target = e.target;
        const row = target.closest('.filter-row');
        
        row.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        target.classList.add('active');

        if (target.hasAttribute('data-root')) {
          currentRoot = target.getAttribute('data-root');
        } else if (target.hasAttribute('data-type')) {
          currentType = target.getAttribute('data-type');
        } else if (target.hasAttribute('data-difficulty')) { // <-- НОВАЯ ПРОВЕРКА КЛИКА
          currentDifficulty = target.getAttribute('data-difficulty');
        }

        renderCards();
      });
    });

    renderCards();

    // 4. Логика переключения темы
    const themeBtn = document.getElementById('themeBtn');
    
    if (localStorage.getItem('theme') === 'dark') {
      document.body.setAttribute('data-theme', 'dark');
      themeBtn.textContent = '☀️';
    } else {
      themeBtn.textContent = '🌙';
    }

    themeBtn.addEventListener('click', () => {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        themeBtn.textContent = '🌙';
      } else {
        document.body.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        themeBtn.textContent = '☀️';
      }
      
      // Перерисовываем графику при смене темы, чтобы поменять цвет линий
      document.querySelectorAll('.chord-canvas').forEach(canvas => {
        drawChordOnCanvas(canvas, canvas.getAttribute('data-frets'));
      });
    });
  </script>

</body>
</html>
